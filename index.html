<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI Discharge Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ECEAE3;
      --surface: #F7F6F3;
      --ink: #0F1419;
      --ink-2: #3B4148;
      --ink-3: #6B7178;
      --line: rgba(15,20,25,0.08);
      --line-strong: rgba(15,20,25,0.14);
      --accent: oklch(0.55 0.085 195);
      --accent-soft: oklch(0.93 0.025 195);
      --warn: oklch(0.62 0.14 35);
      --warn-soft: oklch(0.96 0.03 60);
    }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      font-family: 'IBM Plex Sans Thai', 'Plus Jakarta Sans', system-ui, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'JetBrains Mono', 'IBM Plex Sans Thai', ui-monospace, monospace; }
    :lang(th) { line-height: 1.4; }
    .stage {
      position: relative;
      height: 100dvh;
      overflow: hidden;
      max-width: 480px;
      margin: 0 auto;
    }
    button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    * { box-sizing: border-box; }
    .device-scroll::-webkit-scrollbar { display: none; }
    .device-scroll { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root" class="stage"></div>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "forest",
      "screen": "home"
    }/*EDITMODE-END*/;
  </script>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="qr.jsx"></script>
  <script type="text/babel" src="patient-view.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
